# Gitleaks configuration
# CA certificates are public trust anchors, not secrets.
# The private CA PEM in tfvars.example files is a template placeholder.

[allowlist]
  description = "Allow CA certificate placeholders and public keys"
  paths = [
    '''.*\.tfvars\.example$''',
    '''.*\.md$''',
  ]
