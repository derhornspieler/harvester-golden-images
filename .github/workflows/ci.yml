name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # Secret Scanning
  # -------------------------------------------------------------------
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------
  # Terraform Validate
  # -------------------------------------------------------------------
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [cis, rke2]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.14.5"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ matrix.dir }}

      - name: Terraform Init (validate only)
        run: terraform init -backend=false
        working-directory: ${{ matrix.dir }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.dir }}

  # -------------------------------------------------------------------
  # ShellCheck
  # -------------------------------------------------------------------
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: .
          severity: warning

  # -------------------------------------------------------------------
  # TFLint
  # -------------------------------------------------------------------
  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [cis, rke2]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: terraform-linters/setup-tflint@6e87008f9dd1fe3e34e66aca6c97b4a69f72a7f4 # v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init
        working-directory: ${{ matrix.dir }}

      - name: Run TFLint
        run: tflint
        working-directory: ${{ matrix.dir }}

  # -------------------------------------------------------------------
  # Security — Gitleaks + tfsec + Checkov
  # -------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: tfsec (Terraform security)
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          soft_fail: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkov (IaC policy)
        uses: bridgecrewio/checkov-action@0ce65fae06c148e349f955c3c35ad049c11e838c # v12
        with:
          directory: .
          soft_fail: true
          framework: terraform

  # -------------------------------------------------------------------
  # Markdown Lint
  # -------------------------------------------------------------------
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265 # v19
        with:
          globs: "**/*.md"

  # -------------------------------------------------------------------
  # YAML Lint
  # -------------------------------------------------------------------
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@ae1abb2821b567e96742aa776f7b62c9b6a26bc8 # v3
        with:
          file_or_dir: cis/templates/ rke2/templates/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                allowed-values: ['true', 'false', 'yes', 'no']
              comments:
                min-spaces-from-content: 1
              document-start: disable

  # -------------------------------------------------------------------
  # JSON Lint
  # -------------------------------------------------------------------
  jsonlint:
    name: JSON Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate JSON files
        run: |
          files=$(find . -name '*.json' -not -path './.git/*' | sort)
          if [ -z "$files" ]; then
            echo "No JSON files found"
            exit 0
          fi
          echo "$files" | while read -r f; do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "INVALID: $f"
              python3 -m json.tool "$f"
              exit 1
            fi
          done
          echo "All JSON files valid"

  # -------------------------------------------------------------------
  # SAST — Semgrep
  # -------------------------------------------------------------------
  semgrep:
    name: SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:a3d49dc967b8534a6a76628e50c51cbfe33eb7195dc2feab1fdc0f100852c8ef # latest as of 2026-04-02
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Semgrep scan
        run: semgrep scan --config auto --error .
        env:
          SEMGREP_RULES: auto
