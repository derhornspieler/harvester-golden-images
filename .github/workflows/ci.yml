name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # Secret Scanning
  # -------------------------------------------------------------------
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------
  # Terraform Validate
  # -------------------------------------------------------------------
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [cis, rke2]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.5"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ matrix.dir }}

      - name: Terraform Init (validate only)
        run: terraform init -backend=false
        working-directory: ${{ matrix.dir }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.dir }}

  # -------------------------------------------------------------------
  # ShellCheck
  # -------------------------------------------------------------------
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          severity: warning

  # -------------------------------------------------------------------
  # TFLint
  # -------------------------------------------------------------------
  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [cis, rke2]
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init
        working-directory: ${{ matrix.dir }}

      - name: Run TFLint
        run: tflint
        working-directory: ${{ matrix.dir }}

  # -------------------------------------------------------------------
  # Security — Gitleaks + tfsec + Checkov
  # -------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: tfsec (Terraform security)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkov (IaC policy)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          soft_fail: true
          framework: terraform

  # -------------------------------------------------------------------
  # Markdown Lint
  # -------------------------------------------------------------------
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

  # -------------------------------------------------------------------
  # YAML Lint
  # -------------------------------------------------------------------
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: cis/templates/ rke2/templates/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                allowed-values: ['true', 'false', 'yes', 'no']
              comments:
                min-spaces-from-content: 1
              document-start: disable

  # -------------------------------------------------------------------
  # JSON Lint
  # -------------------------------------------------------------------
  jsonlint:
    name: JSON Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          files=$(find . -name '*.json' -not -path './.git/*' | sort)
          if [ -z "$files" ]; then
            echo "No JSON files found"
            exit 0
          fi
          echo "$files" | while read -r f; do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "INVALID: $f"
              python3 -m json.tool "$f"
              exit 1
            fi
          done
          echo "All JSON files valid"

  # -------------------------------------------------------------------
  # SAST — Semgrep
  # -------------------------------------------------------------------
  semgrep:
    name: SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config auto --error .
        env:
          SEMGREP_RULES: auto
