name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Harvester Golden Images Release

            ### Image Types
            | Image | Distros | Status |
            |-------|---------|--------|
            | CIS-Hardened | Rocky 9, Debian 12 | Production |
            | CIS-Hardened | Ubuntu 24.04, Fedora 42 | Experimental |
            | RKE2 Node | Rocky 9 | Production |

            ### Versions
            - Terraform: `>= 1.5.0` (tested `1.14.5`)
            - Provider `harvester/harvester`: `0.6.7`
            - Provider `hashicorp/kubernetes`: `2.36.0`

            ### Usage
            ```bash
            # Build all production images
            ./build.sh build all

            # Or individually
            ./build.sh build cis-rocky9
            ./build.sh build rke2
            ```
