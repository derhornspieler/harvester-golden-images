name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          body: |
            ## Harvester Golden Images Release

            ### Image Types
            | Image | Distros | Status |
            |-------|---------|--------|
            | CIS-Hardened | Rocky 9, Debian 13, Ubuntu 24.04 | Production |
            | RKE2 Node | Rocky 9 | Production |

            ### Versions
            - Terraform: `>= 1.5.0` (tested `1.14.5`)
            - Provider `harvester/harvester`: `0.6.7`
            - Provider `hashicorp/kubernetes`: `2.36.0`

            ### Usage
            ```bash
            # Build all production images
            ./build.sh build all

            # Or individually
            ./build.sh build cis-rocky9
            ./build.sh build rke2
            ```
