# REFERENCE ONLY — Source of truth is in harvester-rke2-svcs:
#   fleet-gitops/50-gitlab/runners/manifests/external-secret-harvester-kubeconfig.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harvester-kubeconfig
  namespace: gitlab-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: harvester-kubeconfig
    creationPolicy: Owner
  data:
    - secretKey: kubeconfig-harvester.yaml
      remoteRef:
        key: services/ci/harvester-kubeconfig
        property: kubeconfig
