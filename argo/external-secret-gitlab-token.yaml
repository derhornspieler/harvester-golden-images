# REFERENCE ONLY — Source of truth is in harvester-rke2-svcs:
#   fleet-gitops/40-gitops/argo-workflows-manifests/manifests/external-secret-golden-image-watcher.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-golden-images-token
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-golden-images-token
    creationPolicy: Owner
  data:
    - secretKey: GITLAB_USER
      remoteRef:
        key: services/ci/golden-image-watcher
        property: username
    - secretKey: GITLAB_TOKEN
      remoteRef:
        key: services/ci/golden-image-watcher
        property: token
    - secretKey: GITLAB_REPO_URL
      remoteRef:
        key: services/ci/golden-image-watcher
        property: repo-url
